services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-agri-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_TYPE=sqlite
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-smart123}
      - DB_NAME=smart_agriculture
      - SQLITE_DB_PATH=/app/data/smart_agriculture.db
      - OLLAMA_HOST=http://smart-agri-ollama:11434
      - INFERENCE_HOST=http://inference:5000
    volumes:
      - app-data:/app/data
      - app-uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - smart-agri

  mysql:
    image: docker.m.daocloud.io/mysql:8.0
    container_name: smart-agri-mysql
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-smart123}
      - MYSQL_DATABASE=smart_agriculture
      - MYSQL_CHARSET=utf8mb4
      - MYSQL_COLLATION=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./scripts/add-actuator-commands-table.sql:/docker-entrypoint-initdb.d/02-commands.sql:ro
      - ./scripts/create-image-recognition-table.sql:/docker-entrypoint-initdb.d/03-image-recognition.sql:ro
      - ./scripts/create-strategy-table.sql:/docker-entrypoint-initdb.d/04-strategy.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - smart-agri

  ollama:
    image: docker.m.daocloud.io/ollama/ollama:latest
    container_name: smart-agri-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    dns:
      - 223.5.5.5
      - 8.8.8.8
    restart: unless-stopped
    networks:
      - smart-agri

  inference:
    build:
      context: ./inference-service
      dockerfile: Dockerfile
    container_name: smart-agri-inference
    ports:
      - "5000:5000"
    environment:
      - MODEL_PATH=/app/models/yolov5n.pt
    volumes:
      - model-cache:/root/.cache
    restart: unless-stopped
    network_mode: host

volumes:
  mysql-data:
  app-data:
  app-uploads:
  ollama-data:
  model-cache:

networks:
  smart-agri:
    driver: bridge
